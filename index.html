<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Balaji Vihar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body{
  margin:0;
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  text-align:center;
  padding:60px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

h1{
  margin:0;
  font-size:36px;
  color:#22c55e;
}

p{
  opacity:0.7;
}

button{
  margin-top:30px;
  padding:12px 28px;
  border:none;
  border-radius:30px;
  background:#22c55e;
  color:#0f172a;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#16a34a;
}
</style>
</head>

<body>

<div class="card">
  <h1>Balaji Vihar</h1>
  <p>Interactive Property Layout</p>
  <button onclick="location.href='map.html'">Open Map</button>
</div>

</body>
</html>
