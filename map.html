<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Property Boundary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
  body { margin: 0; }
  #map { width: 100vw; height: 100vh; }
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ======================
   MAP SETUP
====================== */
const center = [25.359823, 75.679593];

const map = L.map('map').setView(center, 17);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

/* ======================
   PROPERTY BOUNDARY
====================== */
/*
  Approximate perimeter points
  (clockwise, last point = first)
*/
const boundary = [
  [25.360281, 75.679093], // North-West
  [25.359890, 75.680109], // North-East
  [25.359424, 75.679756], // South-East
  [25.359764, 75.678869], // South-West
  [25.360281, 75.679093]  // Close polygon
];

/* ======================
   DRAW PERIMETER ONLY
====================== */
L.polygon(boundary, {
  color: 'red',
  weight: 3,
  fill: false
}).addTo(map);

/* Marker for reference */
L.marker(center)
  .addTo(map)
  .bindPopup("Property Location");
</script>

</body>
</html>
