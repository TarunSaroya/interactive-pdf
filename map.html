<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Balaji Vihar Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#0f172a;color:white;}
#map{height:100vh;width:100vw;}

.glass{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.topbar{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  padding:10px 20px;
  z-index:1000;
}

button,select{
  background:rgba(255,255,255,0.1);
  border:none;
  color:white;
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
}

#search{
  background:white !important;
  color:black !important;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
}

#search::placeholder{
  color:#666;
}


#search::placeholder {
  color: #666;
}

#filter {
  background: white;
  color: black;
}


button:hover{background:rgba(255,255,255,0.2);cursor:pointer;}

.search-box{
  padding-left:15px;
}

.sidepanel{
  position:absolute;
  top:0;
  right:-400px;
  width:380px;
  height:100%;
  padding:30px;
  transition:0.4s ease;
  z-index:1001;
  color: black;
}

.sidepanel.light-mode {
  background: white;
  color: black;
}

.sidepanel.light-mode .status-badge {
  color: inherit;
}
.sidepanel.light-mode button {
  background: #111827;
  color: white;
}



.sidepanel.open{
  right:0;
}

.close-btn{
  float:right;
  cursor:pointer;
  opacity:0.7;
}

.close-btn:hover{opacity:1;}

.status-badge{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
  display:inline-block;
  margin-top:10px;
}

.report-btn {
  position: absolute;
  top: 15px;
  left: 15px;
  z-index: 1000;
  padding: 10px 15px;
  background: #111;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.report-panel {
  position: fixed;
  top: 0;
  left: -400px;
  width: 350px;
  height: 100%;
  background: white;
  box-shadow: 2px 0 20px rgba(0,0,0,0.2);
  transition: 0.3s ease;
  z-index: 2000;
  padding: 20px;
  overflow-y: auto;
}

.report-panel.active {
  left: 0;
}

.report-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.report-header button {
  border: none;
  background: none;
  font-size: 18px;
  cursor: pointer;
}

.report-actions {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}

.available{background:#22c55e33;color:#22c55e;}
.sold{background:#ef444433;color:#ef4444;}
.reserved{background:#f59e0b33;color:#f59e0b;}
</style>
</head>

<body>

<button id="reportBtn" class="report-btn">📊 Report</button>

<div id="reportPanel" class="report-panel">
  <div class="report-header">
    <h2>Project Report</h2>
    <button id="closeReport">✕</button>
  </div>

  <div id="reportContent"></div>

  <div class="report-actions">
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="window.print()">Print</button>
  </div>
</div>


<div id="map"></div>

<div class="topbar glass">
  <select id="filter">
    <option value="all">All</option>
    <option value="available">Available</option>
    <option value="sold">Sold</option>
    <option value="reserved">Reserved</option>
  </select>

  <input type="text" id="search" placeholder="Search Plot..." class="search-box">
  <button onclick="searchPlot()">Search</button>
</div>

<div class="sidepanel glass" id="panel">
  <span class="close-btn" onclick="closePanel()">✕</span>
  <div id="panelContent"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map;
let plotLayers = {};
let allPlots = {};

const reportBtn = document.getElementById("reportBtn");
const reportPanel = document.getElementById("reportPanel");
const closeReport = document.getElementById("closeReport");
const reportContent = document.getElementById("reportContent");

reportBtn.onclick = () => {
  generateReport();
  reportPanel.classList.add("active");
};

closeReport.onclick = () => {
  reportPanel.classList.remove("active");
};

function generateReport() {
  let total = 0;
  let sold = 0;
  let available = 0;
  let reserved = 0;
  let totalValue = 0;
  let totalArea = 0;

  const blockStats = {};

  Object.values(layoutData.plots).forEach(plot => {
    total++;

    const status = plot.status.toLowerCase();
    if (status === "sold") sold++;
    else if (status === "available") available++;
    else if (status === "reserved") reserved++;

    const price = parseInt(plot.price.replace(/[^0-9]/g, ""));
    totalValue += price;

    const area = parseInt(plot.area);
    totalArea += area;

    if (!blockStats[plot.block]) {
      blockStats[plot.block] = { total: 0, sold: 0 };
    }

    blockStats[plot.block].total++;
    if (status === "sold") blockStats[plot.block].sold++;
  });

  let blockHTML = "";
  for (let block in blockStats) {
    blockHTML += `
      <p><strong>Block ${block}</strong><br>
      Total: ${blockStats[block].total} <br>
      Sold: ${blockStats[block].sold}</p>
    `;
  }

  reportContent.innerHTML = `
    <h3>Overview</h3>
    <p>Total Plots: ${total}</p>
    <p>Available: ${available}</p>
    <p>Sold: ${sold}</p>
    <p>Reserved: ${reserved}</p>

    <h3>Financial</h3>
    <p>Total Value: ₹${totalValue.toLocaleString()}</p>
    <p>Total Area: ${totalArea} sq.ft</p>

    <h3>Block-wise</h3>
    ${blockHTML}
  `;
}


fetch("plots.json")
.then(res=>res.json())
.then(data=>{

  map = L.map('map').setView(data.layout.map_center,18);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',
    maxZoom: 22
  }).addTo(map);

  // Boundary
  L.polygon(data.boundary,{
    color:'#ef4444',
    weight:3,
    fillOpacity:0
  }).addTo(map);

  map.fitBounds(data.boundary);

  allPlots = data.plots;

  Object.entries(data.plots).forEach(([id,plot])=>{

    const color =
      plot.status==="sold" ? "#ef4444":
      plot.status==="reserved" ? "#f59e0b":
      "#22c55e";

    const polygon = L.polygon(plot.coords,{
      color:color,
      fillColor:color,
      fillOpacity:0.3,
      weight:2
    }).addTo(map);

    polygon.on('mouseover',()=>{
      polygon.setStyle({fillOpacity:0.6});
    });

    polygon.on('mouseout',()=>{
      polygon.setStyle({fillOpacity:0.3});
    });

    polygon.on('click',()=>{
      openPanel(id,plot);
    });

    plotLayers[id]=polygon;
  });

});

function openPanel(id,plot){
  const panel=document.getElementById("panel");
  panel.classList.add("open");
  panel.classList.add("light-mode");


  document.getElementById("panelContent").innerHTML=`
    <h2>Plot ${id}</h2>
    <span class="status-badge ${plot.status}">${plot.status}</span>
    <p><strong>Block:</strong> ${plot.block}</p>
    <p><strong>Area:</strong> ${plot.area}</p>
    <p><strong>Dimensions:</strong> ${plot.dimensions}</p>
    <p><strong>Price:</strong> ${plot.price}</p>
    <p><strong>Owner:</strong> ${plot.owner}</p>
    <p><strong>Note:</strong> ${plot.note}</p>
    <button onclick="window.open('plot.html?plot=${id}')">Open Full Details</button>
  `;
}

function closePanel(){
  const panel = document.getElementById("panel");
  panel.classList.remove("open");
  panel.classList.remove("light-mode");
}

function exportCSV() {
  let csv = "Plot,Block,Status,Area,Price\n";

  Object.entries(layoutData.plots).forEach(([id, plot]) => {
    csv += `${id},${plot.block},${plot.status},${plot.area},${plot.price}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "plot-report.csv";
  a.click();
}


document.getElementById("filter").addEventListener("change",function(){
  const value=this.value;

  Object.entries(allPlots).forEach(([id,plot])=>{
    if(value==="all"||plot.status===value){
      plotLayers[id].addTo(map);
    }else{
      map.removeLayer(plotLayers[id]);
    }
  });
});

function searchPlot(){
  const id=document.getElementById("search").value.trim();
  if(plotLayers[id]){
    map.fitBounds(plotLayers[id].getBounds());
    openPanel(id,allPlots[id]);
  }else{
    alert("Plot not found");
  }
}

</script>

</body>
</html>
