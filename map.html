<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Balaji Vihar Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0f172a;
  color:white;
}
#map{height:100vh;width:100vw;}

/* ---------------- TOPBAR ---------------- */
.glass{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.topbar{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  padding:10px 20px;
  z-index:1000;
}

button,select{
  background:rgba(255,255,255,0.1);
  border:none;
  color:white;
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
}

button:hover{
  background:rgba(255,255,255,0.2);
  cursor:pointer;
}

#search{
  background:white !important;
  color:black !important;
}

#search::placeholder{color:#666;}
#filter{background:white;color:black;}

/* ---------------- SIDE PANEL ---------------- */
.sidepanel {
  position:absolute;
  top:0;
  right:-400px;
  width:380px;
  height:100%;
  padding:30px;
  transition:0.4s ease;
  z-index:1001;
  background:white;
  color:black;
}

.sidepanel.open{right:0;}

.close-btn{
  float:right;
  cursor:pointer;
  opacity:0.7;
}

.status-badge{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
  display:inline-block;
  margin-top:10px;
}

.available{background:#22c55e33;color:#22c55e;}
.sold{background:#ef444433;color:#ef4444;}
.reserved{background:#f59e0b33;color:#f59e0b;}

/* ---------------- REPORT BUTTON ---------------- */
.report-btn{
  position:absolute;
  top:20px;
  left:20px;
  z-index:1200;
  padding:10px 16px;
  background:#1e293b;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:600;
  transition:0.2s;
}

.report-btn:hover{
  background:#334155; /* custom hover - no white flash */
}

/* ---------------- REPORT PANEL ---------------- */
.report-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(4px);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:1500;
}

.report-overlay.active{
  opacity:1;
  pointer-events:auto;
}

.report-panel{
  position:fixed;
  top:0;
  left:-420px;
  width:380px;
  height:100%;
  background:white;
  color:black;
  padding:25px;
  box-shadow:2px 0 25px rgba(0,0,0,0.3);
  transition:0.35s ease;
  z-index:2000;
  overflow-y:auto;
}

.report-panel.active{
  left:0;
}

.report-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.report-header button{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.report-actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}
</style>
</head>

<body>

<button id="reportBtn" class="report-btn">📊 Report</button>

<div id="reportOverlay" class="report-overlay"></div>

<div id="reportPanel" class="report-panel glass">
  <div class="report-header">
    <h2>Project Report</h2>
    <button id="closeReport">✕</button>
  </div>
  <div id="reportContent"></div>
  <div class="report-actions">
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="window.print()">Print</button>
  </div>
</div>

<div id="map"></div>

<div class="topbar glass">
  <select id="filter">
    <option value="all">All</option>
    <option value="available">Available</option>
    <option value="sold">Sold</option>
    <option value="reserved">Reserved</option>
  </select>
  <input type="text" id="search" placeholder="Search Plot...">
  <button onclick="searchPlot()">Search</button>
</div>

<div class="sidepanel glass" id="panel">
  <span class="close-btn" onclick="closePanel()">✕</span>
  <div id="panelContent"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let plotLayers = {};
let allPlots = {};

const reportBtn = document.getElementById("reportBtn");
const reportPanel = document.getElementById("reportPanel");
const reportOverlay = document.getElementById("reportOverlay");
const closeReport = document.getElementById("closeReport");
const reportContent = document.getElementById("reportContent");

fetch("plots.json")
.then(res => res.json())
.then(data => {

  map = L.map('map').setView(data.layout.map_center, 18);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',
    maxZoom: 22
  }).addTo(map);

  // Boundary
  L.polygon(data.boundary,{
    color:'#ef4444',
    weight:3,
    fillOpacity:0
  }).addTo(map);

  map.fitBounds(data.boundary);

  allPlots = data.plots;

  Object.entries(data.plots).forEach(([id,plot])=>{

    const color =
      plot.status==="Sold" ? "#ef4444":
      plot.status==="Reserved" ? "#f59e0b":
      "#22c55e";

    const polygon = L.polygon(plot.coords,{
      color:color,
      fillColor:color,
      fillOpacity:0.3,
      weight:2
    }).addTo(map);

    polygon.on('mouseover',()=>{
      polygon.setStyle({fillOpacity:0.6});
    });

    polygon.on('mouseout',()=>{
      polygon.setStyle({fillOpacity:0.3});
    });

    polygon.on('click',()=>{
      openPanel(id,plot);
    });

    plotLayers[id]=polygon;
  });

})
.catch(err=>{
  console.error("JSON not loading:", err);
});


/* ---------- REPORT TOGGLE ---------- */
reportBtn.onclick = () => {
  generateReport();
  reportPanel.classList.add("active");
  reportOverlay.classList.add("active");
};

closeReport.onclick = closeReportPanel;
reportOverlay.onclick = closeReportPanel;

function closeReportPanel(){
  reportPanel.classList.remove("active");
  reportOverlay.classList.remove("active");
}

/* ---------- REPORT GENERATION ---------- */
function generateReport(){
  let total=0,sold=0,available=0,reserved=0,totalValue=0,totalArea=0;
  const blockStats={};

  Object.entries(allPlots).forEach(([id,plot])=>{
    total++;
    const status=plot.status.toLowerCase();

    if(status==="sold") sold++;
    else if(status==="available") available++;
    else if(status==="reserved") reserved++;

    totalValue+=parseInt(plot.price.replace(/[^0-9]/g,"")||0);
    totalArea+=parseInt(plot.area||0);

    if(!blockStats[plot.block])
      blockStats[plot.block]={total:0,sold:0};

    blockStats[plot.block].total++;
    if(status==="sold") blockStats[plot.block].sold++;
  });

  let blockHTML="";
  for(let block in blockStats){
    blockHTML+=`<p><strong>Block ${block}</strong><br>
    Total: ${blockStats[block].total}<br>
    Sold: ${blockStats[block].sold}</p>`;
  }

  reportContent.innerHTML=`
    <h3>Overview</h3>
    <p>Total Plots: ${total}</p>
    <p>Available: ${available}</p>
    <p>Sold: ${sold}</p>
    <p>Reserved: ${reserved}</p>

    <h3>Financial</h3>
    <p>Total Value: ₹${totalValue.toLocaleString()}</p>
    <p>Total Area: ${totalArea} sq.ft</p>

    <h3>Block-wise</h3>
    ${blockHTML}
  `;
}

/* ---------- CSV EXPORT ---------- */
function exportCSV(){
  let csv="Plot,Block,Status,Area,Price\n";
  Object.entries(allPlots).forEach(([id,plot])=>{
    csv+=`${id},${plot.block},${plot.status},${plot.area},${plot.price}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="plot-report.csv";
  a.click();
}

/* ---------- SIDE PANEL ---------- */
function openPanel(id,plot){
  const panel=document.getElementById("panel");
  panel.classList.add("open");

  document.getElementById("panelContent").innerHTML=`
    <h2>Plot ${id}</h2>
    <span class="status-badge ${plot.status}">${plot.status}</span>
    <p><strong>Block:</strong> ${plot.block}</p>
    <p><strong>Area:</strong> ${plot.area}</p>
    <p><strong>Dimensions:</strong> ${plot.dimensions}</p>
    <p><strong>Price:</strong> ${plot.price}</p>
    <p><strong>Owner:</strong> ${plot.owner}</p>
    <p><strong>Note:</strong> ${plot.note}</p>
    <button onclick="window.open('plot.html?plot=${id}')">
      Open Full Details
    </button>
  `;
}

function closePanel(){
  document.getElementById("panel").classList.remove("open");
}


document.getElementById("filter").addEventListener("change",function(){
  const value=this.value;

  Object.entries(allPlots).forEach(([id,plot])=>{
    const status = plot.status.toLowerCase();

    if(value==="all" || status===value){
      plotLayers[id].addTo(map);
    }else{
      map.removeLayer(plotLayers[id]);
    }
  });
});



/* ---------- SEARCH FEATURE ---------- */
function searchPlot(){
  const id=document.getElementById("search").value.trim();

  if(plotLayers[id]){
    map.fitBounds(plotLayers[id].getBounds());
    openPanel(id,allPlots[id]);
  }else{
    alert("Plot not found");
  }
}

</script>

</body>
</html>
